<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Архив APK</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #app-list { display: grid; gap: 20px; width: 100%; max-width: 400px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .btn { display: block; background: #007bff; color: white; text-decoration: none; padding: 10px; border-radius: 6px; margin-top: 15px; font-weight: bold; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Мои APK</h1>
    <div id="app-list"><!-- Сюда JS добавит приложения --></div>

    <script>
        fetch('apps.json')
            .then(res => res.json())
            .then(apps => {
                const list = document.getElementById('app-list');
                apps.forEach(app => {
                    list.innerHTML += `
                        <div class="card">
                            <h3>${app.title}</h3>
                            <p style="color: #888;">Версия: ${app.version}</p>
                            <a href="${app.url}" class="btn" download>Скачать APK</a>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
